<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動時間教學工具 Pro</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #1B1B1F; --start: #ff4757; --end: #2ed573; --bg: #F4F1EC; --accent: #3498db; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .app { max-width: 480px; width: 100%; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .clock-wrap { width: 300px; height: 300px; margin: 0 auto 20px; position: relative; }
        .clock-num { font-size: 26px; font-weight: 700; fill: #333; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
        .circle { cursor: grab; transition: r 0.2s; }
        .circle:active { cursor: grabbing; r: 18; }

        .controls { display: flex; flex-direction: column; gap: 12px; }
        .time-row { display: flex; align-items: center; justify-content: space-between; background: #f8f9fa; padding: 10px 15px; border-radius: 16px; border: 2px solid #eee; }
        .label-text { font-weight: 800; font-size: 1rem; min-width: 65px; }

        .val-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .step-btn { background: #e0e0e0; border: none; width: 32px; height: 26px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        input { width: 48px; text-align: center; border: 1px solid #ccc; border-radius: 8px; padding: 4px; font-family: 'DM Mono'; font-size: 1.2rem; background: white; }

        .btn-toggle { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
        .btn-toggle.active { background: var(--primary); color: white; }
        .eye-btn { background: white; border: 1px solid #ddd; font-size: 1.2rem; border-radius: 10px; width: 42px; height: 42px; cursor: pointer; }
        .eye-btn.hidden { opacity: 0.3; background: #f0f0f0; }

        .result-area { margin-top: 25px; text-align: center; border-top: 2px dashed #ddd; padding-top: 15px; }
        .result-label { font-size: 0.85rem; font-weight: 700; color: #666; text-transform: uppercase; }
        #resTxt { font-size: 2.2rem; font-weight: 800; margin: 5px 0; }
        
        .quiz-box { background: #e3f2fd; border-radius: 12px; padding: 12px; margin-top: 10px; display: none; }
        #quizMsg { color: #1976d2; font-weight: 700; margin-bottom: 8px; }
        .btn-quiz { background: var(--accent); color: white; padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        .btn-check { background: #f39c12; color: white; padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <h2 style="margin:0; font-size: 1.4rem;">Time Tool</h2>
        <button id="modeToggle" class="btn-toggle">Mode: AM/PM</button>
    </div>
    
    <div class="clock-wrap">
        <svg id="clock" viewBox="0 0 400 400">
            <circle cx="200" cy="200" r="185" fill="#fff" stroke="#1B1B1F" stroke-width="8" />
            <g id="numbers"></g>
            <g id="groupS">
                <line id="hourHandS" x1="200" y1="200" x2="200" y2="110" stroke="var(--start)" stroke-width="10" stroke-linecap="round" />
                <line id="minHandS" x1="200" y1="200" x2="200" y2="60" stroke="var(--start)" stroke-width="6" stroke-linecap="round" />
                <circle class="circle" id="hS" cx="200" cy="110" r="15" fill="var(--start)" />
                <circle class="circle" id="mS" cx="200" cy="60" r="11" fill="var(--start)" />
            </g>
            <g id="groupE">
                <line id="hourHandE" x1="200" y1="200" x2="200" y2="110" stroke="var(--end)" stroke-width="10" stroke-linecap="round" opacity="0.8" />
                <line id="minHandE" x1="200" y1="200" x2="200" y2="60" stroke="var(--end)" stroke-width="6" stroke-linecap="round" opacity="0.8" />
                <circle class="circle" id="hE" cx="200" cy="110" r="15" fill="var(--end)" />
                <circle class="circle" id="mE" cx="200" cy="60" r="11" fill="var(--end)" />
            </g>
            <circle cx="200" cy="200" r="8" fill="#1B1B1F" />
        </svg>
    </div>

    <div class="controls">
        <div class="time-row" style="border-left: 6px solid var(--start);">
            <div class="label-text" style="color: var(--start);">Time 1</div>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <button id="sAm" class="btn-toggle active" style="padding: 2px 8px; font-size: 0.7rem;">AM</button>
                <button id="sPm" class="btn-toggle" style="padding: 2px 8px; font-size: 0.7rem;">PM</button>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div class="val-group"><button class="step-btn" onclick="stepTime('s', 60)">▲</button><input type="text" id="sH" readonly><button class="step-btn" onclick="stepTime('s', -60)">▼</button></div>
                <span style="font-weight:bold">:</span>
                <div class="val-group"><button class="step-btn" onclick="stepTime('s', 1)">▲</button><input type="text" id="sM" readonly><button class="step-btn" onclick="stepTime('s', -1)">▼</button></div>
            </div>
            <button class="eye-btn" id="toggleVisS">👁️</button>
        </div>

        <div class="time-row" style="border-left: 6px solid var(--end);">
            <div class="label-text" style="color: var(--end);">Time 2</div>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <button id="eAm" class="btn-toggle active" style="padding: 2px 8px; font-size: 0.7rem;">AM</button>
                <button id="ePm" class="btn-toggle" style="padding: 2px 8px; font-size: 0.7rem;">PM</button>
            </div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div class="val-group"><button class="step-btn" onclick="stepTime('e', 60)">▲</button><input type="text" id="eH" readonly><button class="step-btn" onclick="stepTime('e', -60)">▼</button></div>
                <span style="font-weight:bold">:</span>
                <div class="val-group"><button class="step-btn" onclick="stepTime('e', 1)">▲</button><input type="text" id="eM" readonly><button class="step-btn" onclick="stepTime('e', -1)">▼</button></div>
            </div>
            <button class="eye-btn" id="toggleVisE">👁️</button>
        </div>
    </div>

    <div class="result-area">
        <div class="result-label">Time Difference</div>
        <div id="resTxt">0h 0m</div>
        
        <button id="quizBtn" class="btn-quiz">🎲 隨機挑戰</button>
        
        <div id="quizBox" class="quiz-box">
            <div id="quizMsg"></div>
            <button id="checkBtn" class="btn-check">✔️ 檢查答案</button>
        </div>
    </div>
</div>

<script>
    let startTime = 540, endTime = 885, is24H = false, dragging = null, lastAngle = 0;
    let visS = true, visE = true, quizTargetDiff = 0;

    // 繪製數字
    const numG = document.getElementById('numbers');
    for(let i=1; i<=12; i++) {
        const a = (i * 30) * Math.PI / 180;
        numG.innerHTML += `<text x="${200 + 150 * Math.sin(a)}" y="${200 - 150 * Math.cos(a)}" class="clock-num">${i}</text>`;
    }

    // 基本控制
    document.getElementById('modeToggle').onclick = (e) => { is24H = !is24H; e.target.innerText = `Mode: ${is24H ? '24H' : 'AM/PM'}`; updateUI(); };
    document.getElementById('toggleVisS').onclick = (e) => { visS = !visS; e.currentTarget.classList.toggle('hidden', !visS); updateUI(); };
    document.getElementById('toggleVisE').onclick = (e) => { visE = !visE; e.currentTarget.classList.toggle('hidden', !visE); updateUI(); };

    const setMode = (type, pm) => {
        let t = type === 's' ? startTime : endTime, h = Math.floor(t / 60), m = t % 60;
        h = pm ? (h < 12 ? h + 12 : h) : (h >= 12 ? h - 12 : h);
        if (type === 's') startTime = h * 60 + m; else endTime = h * 60 + m;
        updateUI();
    };

    document.getElementById('sAm').onclick = () => setMode('s', false); document.getElementById('sPm').onclick = () => setMode('s', true);
    document.getElementById('eAm').onclick = () => setMode('e', false); document.getElementById('ePm').onclick = () => setMode('e', true);
    function stepTime(t, d) { if(t === 's') startTime = (startTime + d + 1440) % 1440; else endTime = (endTime + d + 1440) % 1440; updateUI(); }

    // 拖拽
    const clock = document.getElementById('clock');
    ['hS', 'mS', 'hE', 'mE'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('mousedown', (e) => startDrag(e, id));
        el.addEventListener('touchstart', (e) => startDrag(e.touches[0], id), {passive: false});
    });

    function startDrag(e, id) { dragging = id; lastAngle = getAngle(e); document.addEventListener('mousemove', onMove); document.addEventListener('touchmove', onTouchMove, {passive: false}); document.addEventListener('mouseup', stopDrag); document.addEventListener('touchend', stopDrag); }
    function onTouchMove(e) { e.preventDefault(); onMove(e.touches[0]); }
    function onMove(e) {
        if (!dragging) return;
        const curA = getAngle(e); let diff = curA - lastAngle;
        if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
        const mins = Math.round(diff * (dragging.startsWith('m') ? 60/360 : 720/360));
        if (dragging.endsWith('S')) startTime = (startTime + mins + 1440) % 1440; else endTime = (endTime + mins + 1440) % 1440;
        lastAngle = curA; updateUI();
    }
    function getAngle(e) { const r = clock.getBoundingClientRect(); const x = e.clientX - (r.left + r.width/2), y = e.clientY - (r.top + r.height/2); let a = Math.atan2(y, x) * 180 / Math.PI + 90; return a < 0 ? a + 360 : a; }
    function stopDrag() { dragging = null; document.removeEventListener('mousemove', onMove); document.removeEventListener('touchmove', onTouchMove); }

    // 隨機挑戰邏輯
    document.getElementById('quizBtn').onclick = () => {
        startTime = Math.floor(Math.random() * 1440);
        quizTargetDiff = (Math.floor(Math.random() * 11) + 1) * 60 + (Math.floor(Math.random() * 12) * 5); // 1-12小時，5分進位
        visE = false;
        document.getElementById('toggleVisE').classList.add('hidden');
        document.getElementById('quizBox').style.display = 'block';
        document.getElementById('quizMsg').innerText = `請設定 Time 2 為 Time 1 之後的 ${Math.floor(quizTargetDiff/60)}h ${quizTargetDiff%60}m`;
        updateUI();
    };

    document.getElementById('checkBtn').onclick = () => {
        let curDiff = (endTime - startTime + 1440) % 1440;
        if (curDiff === quizTargetDiff) {
            alert("🎉 正確！做得好！");
            visE = true; document.getElementById('toggleVisE').classList.remove('hidden');
            document.getElementById('quizBox').style.display = 'none';
        } else {
            alert(`❌ 不對喔，目前的差距是 ${Math.floor(curDiff/60)}h ${curDiff%60}m，再試試看！`);
        }
        updateUI();
    };

    function updateUI() {
        const gS = document.getElementById('groupS'), gE = document.getElementById('groupE');
        gS.style.opacity = visS ? "1" : "0"; gS.style.pointerEvents = visS ? "auto" : "none";
        gE.style.opacity = visE ? "1" : "0"; gE.style.pointerEvents = visE ? "auto" : "none";

        const draw = (t, hH, mH, hC, mC, hI, mI, amB, pmB) => {
            const h = Math.floor(t / 60), m = t % 60;
            const hA = (h % 12) * 30 + (m / 60) * 30, mA = m * 6;
            [hH, hC].forEach(el => el.setAttribute('transform', `rotate(${hA}, 200, 200)`));
            [mH, mC].forEach(el => el.setAttribute('transform', `rotate(${mA}, 200, 200)`));
            amB.parentElement.style.display = is24H ? 'none' : 'flex';
            hI.value = is24H ? h.toString().padStart(2, '0') : (h % 12 || 12);
            mI.value = m.toString().padStart(2, '0');
            if(!is24H) { amB.classList.toggle('active', h < 12); pmB.classList.toggle('active', h >= 12); }
        };
        draw(startTime, hourHandS, minHandS, hS, mS, sH, sM, sAm, sPm);
        draw(endTime, hourHandE, minHandE, hE, mE, eH, eM, eAm, ePm);
        let d = (endTime - startTime + 1440) % 1440;
        document.getElementById('resTxt').innerText = `${Math.floor(d/60)}h ${d%60}m`;
    }
    updateUI();
</script>
</body>
</html>
